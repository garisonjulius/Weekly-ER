name: Weekly Earnings Scrape

on:
  schedule:
    # Every Sunday at 6:00 AM PST (2:00 PM UTC)
    - cron: "0 14 * * 0"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Step 1 - Reset Google Sheets
        id: reset
        run: python weekly/reset.py 2>&1 | tee /tmp/reset_output.txt
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json

      - name: Step 2 - Merge tickers and generate CSVs
        id: merge
        run: python weekly/merge_tickers.py 2>&1 | tee /tmp/merge_output.txt
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json

      - name: Step 3 - Run Browse AI robots
        id: robots
        run: python weekly/run_robots.py 2>&1 | tee /tmp/robots_output.txt
        env:
          BROWSE_AI_API_KEY: ${{ secrets.BROWSE_AI_API_KEY }}
          GOOGLE_CREDENTIALS_PATH: credentials.json

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi

          # Step outcomes
          step_icon() { [ "$1" = "success" ] && echo "✅" || [ "$1" = "skipped" ] && echo "⏭️" || echo "❌"; }
          RESET_ICON=$(step_icon "${{ steps.reset.outcome }}")
          MERGE_ICON=$(step_icon "${{ steps.merge.outcome }}")
          ROBOTS_ICON=$(step_icon "${{ steps.robots.outcome }}")

          # Ticker count from merge step
          TICKER_COUNT=$(grep -oP 'Created Master_Tickers with \K\d+' /tmp/merge_output.txt 2>/dev/null || echo "?")

          # Grab last error line from whichever step failed
          ERROR=""
          if [ "${{ steps.reset.outcome }}" = "failure" ]; then
            ERROR=$(tail -1 /tmp/reset_output.txt 2>/dev/null || echo "")
          elif [ "${{ steps.merge.outcome }}" = "failure" ]; then
            ERROR=$(tail -1 /tmp/merge_output.txt 2>/dev/null || echo "")
          elif [ "${{ steps.robots.outcome }}" = "failure" ]; then
            ERROR=$(tail -1 /tmp/robots_output.txt 2>/dev/null || echo "")
          fi

          ERROR_LINE=""
          if [ -n "$ERROR" ]; then
            ERROR_LINE="\nError: $ERROR"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"$EMOJI *Weekly Earnings Scrape* — $STATUS\n${RESET_ICON} Reset Sheets  ${MERGE_ICON} Merge Tickers ($TICKER_COUNT)  ${ROBOTS_ICON} Browse AI Robots$ERROR_LINE\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

name: Weekly Earnings Scrape

on:
  schedule:
    # Every Sunday at 6:00 AM PST (2:00 PM UTC)
    - cron: "0 14 * * 0"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Step 1 - Reset Google Sheets
        run: python weekly/reset.py
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json

      - name: Step 2 - Merge tickers and generate CSVs
        run: python weekly/merge_tickers.py
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json

      - name: Step 3 - Run Browse AI robots
        run: python weekly/run_robots.py
        env:
          BROWSE_AI_API_KEY: ${{ secrets.BROWSE_AI_API_KEY }}
          GOOGLE_CREDENTIALS_PATH: credentials.json

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"$EMOJI GitHub Action Finished\nRepo: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}\nStatus: $STATUS\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

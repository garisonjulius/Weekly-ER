name: Mid-Weekly Earnings Scrape

on:
  workflow_dispatch: # Triggered by cron-job.org at 9:00 AM PST Thursday (17:00 UTC) — adjust for DST (see CLAUDE.md)
    inputs:
      limit:
        description: "Cap newly confirmed tickers (leave blank for no limit)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Run thursday.py
        id: thursday
        run: |
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
          fi
          python mid-weekly/thursday.py $LIMIT_ARG 2>&1 | tee /tmp/thursday_output.txt
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json
          BROWSE_AI_API_KEY: ${{ secrets.BROWSE_AI_API_KEY }}

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi

          NEW_COUNT=$(grep -oP 'Newly confirmed tickers: \K\d+' /tmp/thursday_output.txt 2>/dev/null || echo "?")

          ERROR=""
          if [ "${{ steps.thursday.outcome }}" = "failure" ]; then
            ERROR=$(tail -1 /tmp/thursday_output.txt 2>/dev/null || echo "")
          fi

          ERROR_LINE=""
          if [ -n "$ERROR" ]; then
            ERROR_LINE="\nError: $ERROR"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"$EMOJI *Mid-Weekly Earnings Scrape* — $STATUS\nNewly confirmed tickers: $NEW_COUNT$ERROR_LINE\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

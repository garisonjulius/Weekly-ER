name: Saturday Weekly Prep

on:
  schedule:
    - cron: '0 15 * * 6'  # Saturday 8:00 AM PDT (UTC-7) — adjust for DST (see CLAUDE.md)
  workflow_dispatch:

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run saturday.py
        run: python weekly/saturday.py

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\": \"$EMOJI *Saturday Weekly Prep* — $STATUS\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

name: Daily Stock Scrape

on:
  schedule:
    # 7:30 AM PST (15:30 UTC) Mon-Fri
    - cron: "30 15 * * 1-5"
    # 11:30 AM PST (19:30 UTC) Mon-Fri
    - cron: "30 19 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run daily scraper (losers mode)
        run: node "Daily Individual/daily.js" --losers
        env:
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/credentials.json

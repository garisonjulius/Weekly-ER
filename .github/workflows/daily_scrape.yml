name: Daily Stock Scrape

on:
  schedule:
    # 6:30 AM PST (14:30 UTC) Mon-Fri
    - cron: "30 14 * * 1-5"
    # 10:00 AM PST (18:00 UTC) Mon-Fri
    - cron: "0 18 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run daily scraper (losers mode)
        run: node daily/daily.js --losers
        env:
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/credentials.json
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"$EMOJI GitHub Action Finished\nRepo: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}\nStatus: $STATUS\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
